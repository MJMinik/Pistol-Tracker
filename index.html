<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pistol Practice & Maintenance Tracker</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a2028;
    --panel-2: #232b36;
    --border: #2d3744;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #ff6b35;
    --accent-dim: #b8421f;
    --success: #3fb950;
    --warn: #d29922;
    --danger: #f85149;
    --info: #58a6ff;
    --shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.5; height: 100vh; overflow: hidden;
  }
  .app { display: flex; height: 100vh; }
  .sidebar {
    width: 240px; background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 20px 0; display: flex; flex-direction: column;
  }
  .brand { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .brand h1 { font-size: 18px; font-weight: 600; }
  .brand .sub { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  nav { flex: 1; }
  nav a {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; color: var(--text-dim);
    text-decoration: none; cursor: pointer;
    font-size: 14px; border-left: 3px solid transparent;
  }
  nav a:hover { background: var(--panel-2); color: var(--text); }
  nav a.active { background: var(--panel-2); color: var(--accent); border-left-color: var(--accent); }
  nav .icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-footer { padding: 12px 20px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-dim); }
  main { flex: 1; overflow-y: auto; padding: 24px 32px; }
  .view { display: none; }
  .view.active { display: block; }
  .view-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .view-header h2 { font-size: 22px; font-weight: 600; }
  .view-header .sub { color: var(--text-dim); font-size: 13px; margin-top: 4px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; background: var(--accent);
    color: #fff; border: none; border-radius: 6px;
    cursor: pointer; font-size: 13px; font-weight: 500;
  }
  .btn:hover { background: var(--accent-dim); }
  .btn.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  .btn.secondary:hover { background: var(--border); }
  .btn.danger { background: var(--danger); }
  .btn.small { padding: 5px 10px; font-size: 12px; }
  .btn.success { background: var(--success); }

  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 20px; margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 12px; }

  .grid { display: grid; gap: 16px; }
  .grid-4 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
  .grid-3 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  .grid-2 { grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); }

  .stat {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 20px;
  }
  .stat .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
  .stat .value { font-size: 28px; font-weight: 600; margin-top: 6px; }
  .stat .value.accent { color: var(--accent); }
  .stat .delta { font-size: 12px; color: var(--success); margin-top: 4px; }

  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
  th { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 500; }
  tbody tr:hover { background: var(--panel-2); }

  .badge {
    display: inline-block; padding: 2px 8px;
    border-radius: 10px; font-size: 11px; font-weight: 500;
  }
  .badge.success { background: rgba(63,185,80,0.15); color: var(--success); }
  .badge.warn { background: rgba(210,153,34,0.15); color: var(--warn); }
  .badge.danger { background: rgba(248,81,73,0.15); color: var(--danger); }
  .badge.info { background: rgba(88,166,255,0.15); color: var(--info); }
  .badge.neutral { background: var(--panel-2); color: var(--text-dim); }
  .badge.pr { background: rgba(255,107,53,0.18); color: var(--accent); }

  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    justify-content: center; align-items: flex-start;
    overflow-y: auto; padding: 40px 20px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; width: 100%; max-width: 700px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  }
  .modal-header {
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-header h3 { font-size: 16px; }
  .modal-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 20px; }
  .modal-body { padding: 24px; }
  .modal-footer {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }

  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-row input, .form-row select, .form-row textarea {
    width: 100%; padding: 8px 10px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-size: 13px; font-family: inherit;
  }
  .form-row textarea { resize: vertical; min-height: 60px; }
  .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .form-grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }

  .alert {
    padding: 12px 16px; border-radius: 6px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px; font-size: 13px;
  }
  .alert.warn { background: rgba(210,153,34,0.1); border: 1px solid var(--warn); color: var(--warn); }
  .alert.danger { background: rgba(248,81,73,0.1); border: 1px solid var(--danger); color: var(--danger); }
  .alert.info { background: rgba(88,166,255,0.1); border: 1px solid var(--info); color: var(--info); }
  .alert.success { background: rgba(63,185,80,0.1); border: 1px solid var(--success); color: var(--success); }

  .progress {
    height: 6px; background: var(--panel-2);
    border-radius: 3px; overflow: hidden; margin-top: 6px;
  }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
  .progress-fill.warn { background: var(--warn); }
  .progress-fill.danger { background: var(--danger); }
  .progress-fill.success { background: var(--success); }

  .image-gallery { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .image-thumb {
    width: 80px; height: 80px;
    background-size: cover; background-position: center;
    border-radius: 6px; border: 1px solid var(--border);
    cursor: pointer; position: relative;
  }
  .image-thumb .remove {
    position: absolute; top: 2px; right: 2px;
    background: rgba(0,0,0,0.7); color: white;
    border: none; border-radius: 50%;
    width: 18px; height: 18px; font-size: 11px;
    cursor: pointer; line-height: 1;
  }

  .chip-list { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .chip {
    background: var(--panel-2); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 12px; font-size: 12px;
  }

  .chart-container { padding: 12px 0; }
  svg.chart { width: 100%; height: 220px; }

  .empty {
    text-align: center; padding: 40px 20px;
    color: var(--text-dim); font-size: 14px;
  }
  .empty .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }

  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.9); z-index: 200;
    justify-content: center; align-items: center; cursor: zoom-out;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; }

  hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  .help-text { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .text-dim { color: var(--text-dim); }
  .text-accent { color: var(--accent); }
  .text-success { color: var(--success); }
  .text-warn { color: var(--warn); }
  .text-danger { color: var(--danger); }
  .row-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  details summary { cursor: pointer; padding: 8px 0; font-weight: 500; }
  details summary:hover { color: var(--accent); }
  details > div { padding: 8px 0 8px 16px; font-size: 13px; color: var(--text-dim); }

  .skill-rating {
    display: flex; align-items: center; gap: 4px;
  }
  .skill-rating input[type=range] {
    flex: 1;
    accent-color: var(--accent);
  }
  .skill-rating .val {
    min-width: 28px; text-align: center;
    font-weight: 600; color: var(--accent);
  }

  .pr-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .pr-row:last-child { border-bottom: none; }
  .pr-row .name { font-weight: 500; }
  .pr-row .meta { font-size: 11px; color: var(--text-dim); }
  .pr-row .score { font-size: 18px; font-weight: 600; color: var(--accent); }

  .goal-item {
    display: flex; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .goal-item.done { opacity: 0.6; }
  .goal-item.done .text { text-decoration: line-through; }
  .goal-item input[type=checkbox] {
    width: 18px; height: 18px; accent-color: var(--success);
    margin-top: 2px;
  }
  .goal-item .text { flex: 1; font-size: 14px; }
  .goal-item .meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .tabs .tab {
    padding: 10px 16px; cursor: pointer; font-size: 13px;
    color: var(--text-dim); border-bottom: 2px solid transparent;
  }
  .tabs .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>Pistol Tracker</h1>
      <div class="sub">Practice & Maintenance</div>
    </div>
    <nav>
      <a data-view="dashboard" class="active"><span class="icon">&#9678;</span> Dashboard</a>
      <a data-view="firearms"><span class="icon">&#9670;</span> Firearms</a>
      <a data-view="ammo"><span class="icon">&#9679;</span> Ammunition</a>
      <a data-view="sessions"><span class="icon">&#9650;</span> Sessions</a>
      <a data-view="progress"><span class="icon">&#9733;</span> Progress</a>
      <a data-view="malfunctions"><span class="icon">&#9888;</span> Malfunctions</a>
      <a data-view="maintenance"><span class="icon">&#9881;</span> Maintenance</a>
      <a data-view="reference"><span class="icon">&#9432;</span> Atlas Reference</a>
      <a data-view="settings"><span class="icon">&#9776;</span> Settings</a>
    </nav>
    <div class="sidebar-footer">
      v1.1 &middot; <a href="#" id="export-data" style="color:var(--accent)">Export Data</a>
    </div>
  </aside>

  <main>
    <div id="view-dashboard" class="view active"></div>
    <div id="view-firearms" class="view"></div>
    <div id="view-ammo" class="view"></div>
    <div id="view-sessions" class="view"></div>
    <div id="view-progress" class="view"></div>
    <div id="view-malfunctions" class="view"></div>
    <div id="view-maintenance" class="view"></div>
    <div id="view-reference" class="view"></div>
    <div id="view-settings" class="view"></div>
  </main>
</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal"></div>
</div>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightbox-img" alt="">
</div>

<script>
/* ============================================================
   PISTOL PRACTICE & MAINTENANCE TRACKER  v1.0
   Single-file app. All data persisted to localStorage.
   ============================================================ */

const STORAGE_KEY = 'pistolTrackerV1';
const DEEP_CLEAN_INTERVAL = 10000;

const SKILL_AREAS = [
  { key: 'draw', label: 'Draw' },
  { key: 'reload', label: 'Reload' },
  { key: 'splits', label: 'Splits' },
  { key: 'transitions', label: 'Transitions' },
  { key: 'accuracy', label: 'Accuracy' },
  { key: 'movement', label: 'Movement' },
  { key: 'mental', label: 'Mental Game' },
  { key: 'recoil', label: 'Recoil Control' }
];

const SEED = {
  firearms: [
    { id: 'fa-1', name: 'Atlas Erebus', model: 'Erebus', manufacturer: 'Atlas Gunworks', caliber: '9mm', dateAcquired: '', startingRoundCount: 0, recoilSpringInterval: 5000, recoilSpringWeight: '', notes: '' },
    { id: 'fa-2', name: 'Atlas Apollo', model: 'Apollo', manufacturer: 'Atlas Gunworks', caliber: '9mm', dateAcquired: '', startingRoundCount: 0, recoilSpringInterval: 5000, recoilSpringWeight: '', notes: '' },
    { id: 'fa-3', name: 'Atlas Eos', model: 'Eos', manufacturer: 'Atlas Gunworks', caliber: '9mm', dateAcquired: '', startingRoundCount: 0, recoilSpringInterval: 5000, recoilSpringWeight: '', notes: '' },
    { id: 'fa-4', name: 'Staccato XC', model: 'XC', manufacturer: 'Staccato', caliber: '9mm', dateAcquired: '', startingRoundCount: 0, recoilSpringInterval: 5000, recoilSpringWeight: '', notes: '' }
  ],
  ammunition: [],
  sessions: [],
  maintenance: [],
  drillLibrary: [
    // Holster + live fire (classic competition drills)
    { name: 'Bill Drill', description: '6 shots from holster at 7 yards on USPSA target.', scoring: 'time', requiresHolster: true, liveCompatible: true, dryCompatible: true, category: 'speed' },
    { name: 'El Presidente', description: '3 targets, 6 shots, reload, 6 more shots at 10 yards.', scoring: 'time_score', maxScore: 60, requiresHolster: true, liveCompatible: true, dryCompatible: true, category: 'classic' },
    { name: 'Mozambique / Failure Drill', description: '2 to body, 1 to head from holster or low ready.', scoring: 'time', requiresHolster: false, liveCompatible: true, dryCompatible: true, category: 'speed' },
    { name: 'Draw to First Shot', description: 'Timed draws from holster to A-zone hit.', scoring: 'time', requiresHolster: true, liveCompatible: true, dryCompatible: true, category: 'speed' },
    { name: 'Hackathorn Standards', description: 'Multi-position practical drill.', scoring: 'time_score', requiresHolster: true, liveCompatible: true, dryCompatible: true, category: 'classic' },
    { name: 'Match Stage', description: 'USPSA / IDPA / steel match stage.', scoring: 'time_score', requiresHolster: true, liveCompatible: true, dryCompatible: false, category: 'competition' },
    // No holster + live fire
    { name: '10-10-10', description: '10 yards, 10 rounds, 10 seconds, B-8 target.', scoring: 'score', maxScore: 100, requiresHolster: false, liveCompatible: true, dryCompatible: false, category: 'standards' },
    { name: 'Dot Torture', description: '50 rounds on 10 dots, drills per dot.', scoring: 'score', maxScore: 50, requiresHolster: false, liveCompatible: true, dryCompatible: false, category: 'accuracy' },
    { name: 'Wilson 5x5', description: '5 yards, 5 shots, 5 seconds, from low ready.', scoring: 'time', requiresHolster: false, liveCompatible: true, dryCompatible: true, category: 'standards' },
    { name: 'B-8 Standards', description: 'Slow / timed / rapid fire on B-8 bullseye at varying distances.', scoring: 'score', maxScore: 100, requiresHolster: false, liveCompatible: true, dryCompatible: false, category: 'accuracy' },
    { name: 'Triple Nickel', description: '5 shots, 5 yards, 5-inch circle, 5 seconds.', scoring: 'score', maxScore: 5, requiresHolster: false, liveCompatible: true, dryCompatible: false, category: 'standards' },
    { name: 'Strong-Hand Only', description: 'Single-hand shooting with dominant hand.', scoring: 'score', requiresHolster: false, liveCompatible: true, dryCompatible: true, category: 'fundamentals' },
    { name: 'Weak-Hand Only', description: 'Single-hand shooting with support hand.', scoring: 'score', requiresHolster: false, liveCompatible: true, dryCompatible: true, category: 'fundamentals' },
    { name: 'Slow Fire / Group Shooting', description: 'Slow deliberate accuracy work.', scoring: 'score', requiresHolster: false, liveCompatible: true, dryCompatible: false, category: 'accuracy' },
    { name: 'Cadence Drill', description: 'Even-paced rhythm shots — splits work.', scoring: 'time', requiresHolster: false, liveCompatible: true, dryCompatible: true, category: 'speed' },
    { name: 'Walk Back Drill', description: 'Engage target, step back each successful round.', scoring: 'score', requiresHolster: false, liveCompatible: true, dryCompatible: false, category: 'accuracy' },
    { name: 'Press Out', description: 'Press out from compressed ready to first shot.', scoring: 'time', requiresHolster: false, liveCompatible: true, dryCompatible: true, category: 'fundamentals' },
    { name: 'One Reload One', description: '1 shot, reload, 1 shot — par time.', scoring: 'time', requiresHolster: false, liveCompatible: true, dryCompatible: true, category: 'manipulation' },
    { name: 'Reload Drill', description: 'Practice reloads under time.', scoring: 'time', requiresHolster: false, liveCompatible: true, dryCompatible: true, category: 'manipulation' },
    { name: 'Transition Drill', description: 'Transition between 2+ targets, par time scored.', scoring: 'time', requiresHolster: false, liveCompatible: true, dryCompatible: true, category: 'speed' },
    { name: 'Position Entry / Exit', description: 'Drill entering and exiting shooting positions.', scoring: 'time', requiresHolster: false, liveCompatible: true, dryCompatible: true, category: 'movement' },
    // Dry fire only
    { name: 'Wall Drill', description: 'Stand close to a wall, work trigger press without sight movement.', scoring: 'none', requiresHolster: false, liveCompatible: false, dryCompatible: true, category: 'fundamentals' },
    { name: 'Coin Drill', description: 'Balance a coin on the front sight, dry fire without dropping it.', scoring: 'none', requiresHolster: false, liveCompatible: false, dryCompatible: true, category: 'fundamentals' },
    { name: 'Dry Fire Reload', description: 'Reload practice with dummy/empty magazines.', scoring: 'time', requiresHolster: false, liveCompatible: false, dryCompatible: true, category: 'manipulation' },
    { name: 'Index Drill', description: 'Eyes-closed presentation, open and check natural point of aim.', scoring: 'none', requiresHolster: false, liveCompatible: false, dryCompatible: true, category: 'fundamentals' },
    { name: 'Dry Fire Draws', description: 'Holster draws to first sight picture, par time.', scoring: 'time', requiresHolster: true, liveCompatible: false, dryCompatible: true, category: 'speed' },
    // General
    { name: 'Standard Practice', description: 'General practice / freestyle / warm-up.', scoring: 'none', requiresHolster: false, liveCompatible: true, dryCompatible: true, category: 'general' }
  ],
  goals: [],
  skillAssessments: [],
  malfunctions: [],
  settings: {
    firstUse: true,
    version: '1.2',
    magazineSpringSchedule: { startDate: '2026-06-01', intervalMonths: 6 },
    defaultRecoilSpringInterval: 5000
  }
};

let DB = loadDB();

function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return JSON.parse(JSON.stringify(SEED));
    const parsed = JSON.parse(raw);
    for (const key of Object.keys(SEED)) {
      if (parsed[key] === undefined) parsed[key] = JSON.parse(JSON.stringify(SEED[key]));
    }
    return parsed;
  } catch (e) {
    console.error('Failed to load DB', e);
    return JSON.parse(JSON.stringify(SEED));
  }
}
function saveDB() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
  } catch (e) {
    alert('Could not save data. localStorage may be full. Consider exporting and clearing target images.');
    console.error(e);
  }
}
function uid(prefix = 'id') {
  return prefix + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);
}

function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}
function todayISO() { return new Date().toISOString().slice(0, 10); }
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function getFirearm(id) { return DB.firearms.find(f => f.id === id); }
function getAmmo(id) { return DB.ammunition.find(a => a.id === id); }
function getDrillDef(name) { return DB.drillLibrary.find(d => d.name === name); }

function firearmRoundCount(firearmId) {
  const fa = getFirearm(firearmId);
  if (!fa) return 0;
  let total = fa.startingRoundCount || 0;
  for (const s of DB.sessions) if (s.firearmId === firearmId) total += (s.totalRounds || 0);
  return total;
}
function roundsSinceDeepClean(firearmId) {
  const lastDeep = [...DB.maintenance]
    .filter(m => m.firearmId === firearmId && m.type === 'deep_clean')
    .sort((a, b) => b.date.localeCompare(a.date))[0];
  if (!lastDeep) return firearmRoundCount(firearmId);
  let total = 0;
  for (const s of DB.sessions) {
    if (s.firearmId === firearmId && s.date > lastDeep.date) total += s.totalRounds || 0;
  }
  return total;
}
function lastMaintenance(firearmId, type) {
  return DB.maintenance
    .filter(m => m.firearmId === firearmId && (type ? m.type === type : true))
    .sort((a, b) => b.date.localeCompare(a.date))[0];
}
function maintenanceStatus(firearmId) {
  const sinceDeep = roundsSinceDeepClean(firearmId);
  const annual = lastMaintenance(firearmId, 'annual_inspection');
  const lastFS = lastMaintenance(firearmId, 'field_strip');
  const lastFSDate = lastFS ? lastFS.date : '0000-00-00';
  const sessionsAfter = DB.sessions.filter(s => s.firearmId === firearmId && s.date > lastFSDate).length;
  let annualOverdue = false;
  if (annual) {
    const months = (new Date() - new Date(annual.date)) / (1000 * 60 * 60 * 24 * 30);
    if (months > 12) annualOverdue = true;
  }
  return {
    roundsSinceDeepClean: sinceDeep,
    deepCleanProgress: Math.min(100, (sinceDeep / DEEP_CLEAN_INTERVAL) * 100),
    deepCleanDue: sinceDeep >= DEEP_CLEAN_INTERVAL,
    deepCleanWarning: sinceDeep >= DEEP_CLEAN_INTERVAL * 0.9 && sinceDeep < DEEP_CLEAN_INTERVAL,
    sessionsSinceFieldStrip: sessionsAfter,
    fieldStripDue: sessionsAfter > 0,
    annualOverdue,
    annualMissing: !annual,
    lastFieldStrip: lastFS,
    lastDeepClean: lastMaintenance(firearmId, 'deep_clean'),
    lastAnnual: annual
  };
}

/* Recoil spring tracking: round-count interval per firearm */
function recoilSpringStatus(firearmId) {
  const f = getFirearm(firearmId);
  if (!f) return null;
  const interval = f.recoilSpringInterval || (DB.settings.defaultRecoilSpringInterval || 5000);
  const lastReplace = lastMaintenance(firearmId, 'recoil_spring');
  const totalRounds = firearmRoundCount(firearmId);
  let sinceReplace;
  if (lastReplace) {
    // Sum rounds in sessions after the replacement date
    let after = 0;
    for (const s of DB.sessions) {
      if (s.firearmId === firearmId && s.date > lastReplace.date) after += s.totalRounds || 0;
    }
    sinceReplace = after;
  } else {
    sinceReplace = totalRounds;
  }
  return {
    interval,
    lastReplace,
    sinceReplace,
    progress: Math.min(100, (sinceReplace / interval) * 100),
    due: sinceReplace >= interval,
    warning: sinceReplace >= interval * 0.9 && sinceReplace < interval,
    neverReplaced: !lastReplace
  };
}

/* Magazine spring schedule: time-based, every N months from a start date */
function magazineSpringStatus() {
  const sched = (DB.settings && DB.settings.magazineSpringSchedule) || { startDate: '2026-06-01', intervalMonths: 6 };
  const intervalMonths = sched.intervalMonths || 6;
  const start = new Date(sched.startDate || '2026-06-01');
  // Find most recent mag_springs maintenance across all firearms
  const allMagSpring = DB.maintenance.filter(m => m.type === 'mag_springs').sort((a,b) => b.date.localeCompare(a.date));
  const lastDone = allMagSpring[0];

  function addMonths(d, m) {
    const nd = new Date(d);
    nd.setMonth(nd.getMonth() + m);
    return nd;
  }

  let nextDue;
  if (lastDone) {
    nextDue = addMonths(new Date(lastDone.date), intervalMonths);
  } else {
    nextDue = new Date(start);
    // Don't show as overdue before start date
  }

  const now = new Date();
  const msPerDay = 1000 * 60 * 60 * 24;
  const daysUntil = Math.round((nextDue - now) / msPerDay);
  const overdue = daysUntil < 0;
  const dueSoon = daysUntil >= 0 && daysUntil <= 30;
  return {
    nextDue,
    daysUntil,
    overdue,
    dueSoon,
    lastDone,
    intervalMonths,
    startDate: sched.startDate
  };
}

/* ============================================================
   PROGRESS / PR HELPERS
   ============================================================ */
function allDrillRecords() {
  // Returns flat list of drill instances with session date for analysis
  const recs = [];
  for (const s of DB.sessions) {
    for (const d of (s.drills || [])) {
      if (!d.name) continue;
      recs.push({
        date: s.date,
        sessionId: s.id,
        firearmId: s.firearmId,
        name: d.name,
        distance: d.distance || '',
        time: typeof d.time === 'number' ? d.time : (d.time ? parseFloat(d.time) : null),
        score: typeof d.score === 'number' ? d.score : (d.score ? parseFloat(d.score) : null),
        maxScore: d.maxScore || (getDrillDef(d.name) || {}).maxScore || null,
        notes: d.notes || ''
      });
    }
  }
  return recs;
}
function personalRecords() {
  const recs = allDrillRecords();
  const groups = {};
  for (const r of recs) {
    if (!groups[r.name]) groups[r.name] = [];
    groups[r.name].push(r);
  }
  const prs = [];
  for (const name of Object.keys(groups)) {
    const list = groups[name];
    const def = getDrillDef(name);
    const scoring = def?.scoring || 'time';
    let best = null;
    if (scoring === 'time') {
      const timed = list.filter(r => r.time != null && r.time > 0);
      if (timed.length) best = timed.reduce((a, b) => (a.time <= b.time ? a : b));
    } else if (scoring === 'score') {
      const scored = list.filter(r => r.score != null);
      if (scored.length) best = scored.reduce((a, b) => (a.score >= b.score ? a : b));
    } else if (scoring === 'time_score') {
      // Hit Factor proxy: score/time
      const both = list.filter(r => r.score != null && r.time != null && r.time > 0);
      if (both.length) best = both.reduce((a, b) => ((a.score / a.time) >= (b.score / b.time) ? a : b));
    }
    prs.push({ name, scoring, best, attempts: list.length });
  }
  prs.sort((a, b) => b.attempts - a.attempts);
  return prs;
}
function formatDrillScore(r, scoring) {
  if (!r) return '—';
  if (scoring === 'time') return r.time != null ? r.time.toFixed(2) + 's' : '—';
  if (scoring === 'score') return r.score != null ? r.score + (r.maxScore ? '/' + r.maxScore : '') : '—';
  if (scoring === 'time_score') {
    const hf = r.time && r.time > 0 ? (r.score / r.time).toFixed(2) : '—';
    return `${r.score}/${r.maxScore || '?'} in ${r.time?.toFixed(2)}s (HF ${hf})`;
  }
  return '—';
}

    <div class="modal-body">
      <div class="form-grid-2">
        <div class="form-row"><label>Brand</label><input id="am-brand" value="${escapeHtml(a.brand)}" placeholder="e.g. Federal"></div>
        <div class="form-row"><label>Caliber</label><input id="am-caliber" value="${escapeHtml(a.caliber)}"></div>
      </div>
      <div class="form-grid-2">
        <div class="form-row"><label>Grain</label><input id="am-grain" type="number" value="${escapeHtml(a.grain)}" placeholder="124"></div>
        <div class="form-row"><label>Bullet Type</label>
          <select id="am-type">
            ${['FMJ','JHP','HP','Frangible','Lead Round Nose','Plated','Match'].map(t => `<option ${a.bulletType===t?'selected':''}>${t}</option>`).join('')}
            ${a.bulletType && !['FMJ','JHP','HP','Frangible','Lead Round Nose','Plated','Match'].includes(a.bulletType) ? `<option selected>${escapeHtml(a.bulletType)}</option>` : ''}
          </select>
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-row"><label>Quantity in Inventory</label><input id="am-qty" type="number" min="0" value="${a.quantity || 0}"></div>
        <div class="form-row"><label>Cost per round (optional)</label><input id="am-cost" type="number" step="0.001" value="${a.costPerRound || ''}" placeholder="0.30"></div>
      </div>
      <div class="form-row"><label>Notes</label><textarea id="am-notes">${escapeHtml(a.notes)}</textarea></div>
    </div>
    <div class="modal-footer">

      <button class="btn" onclick="saveAmmo('${id || ''}')">Save</button>

}
function saveAmmo(id) {
  const data = {
    brand: document.getElementById('am-brand').value.trim(),
    caliber: document.getElementById('am-caliber').value.trim(),
    grain: document.getElementById('am-grain').value,
    bulletType: document.getElementById('am-type').value,
    quantity: parseInt(document.getElementById('am-qty').value) || 0,
    costPerRound: parseFloat(document.getElementById('am-cost').value) || '',
    notes: document.getElementById('am-notes').value.trim()
  };
  if (!data.brand) { alert('Brand required'); return; }
  if (id) Object.assign(getAmmo(id), data);
  else DB.ammunition.push({ id: uid('am'), ...data });
  saveDB(); closeModal(); renderAmmo();
}
function deleteAmmo(id) {
  if (!confirm('Delete this ammunition record?')) return;
  DB.ammunition = DB.ammunition.filter(a => a.id !== id);
  saveDB(); renderAmmo();
}

/* ============================================================
   SESSIONS
   ============================================================ */
function renderSessions() {
  const v = document.getElementById('view-sessions');
  const sessions = [...DB.sessions].sort((a, b) => b.date.localeCompare(a.date));

  // Build field-strip-needed list: each firearm with one or more sessions after their last field strip
  const fsNeeded = [];
  for (const f of DB.firearms) {
    const st = maintenanceStatus(f.id);
    if (st.fieldStripDue && st.sessionsSinceFieldStrip > 0) {
      fsNeeded.push({ firearm: f, count: st.sessionsSinceFieldStrip, lastFS: st.lastFieldStrip });
    }
  }
  // Identify the firearm of the most recent session for the prominent button
  const latestSession = sessions[0];
  const latestFirearmId = latestSession ? latestSession.firearmId : (DB.firearms[0] && DB.firearms[0].id);
  const latestFirearm = latestFirearmId ? getFirearm(latestFirearmId) : null;

  v.innerHTML = `
    <div class="view-header">
      <div><h2>Range Sessions</h2><div class="sub">Practice and competition log</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${latestFirearm ? `<button class="btn secondary" onclick="quickFieldStrip('${latestFirearm.id}')" title="Log field strip & clean for ${escapeHtml(latestFirearm.name)}">&#9881; Field Strip ${escapeHtml(latestFirearm.name)}</button>` : ''}
        <button class="btn" onclick="openSessionModal()">+ Log Session</button>
      </div>
    </div>
    ${fsNeeded.length ? `<div class="alert warn" style="flex-direction:column;align-items:stretch">
      <div style="display:flex;align-items:center;gap:10px"><strong style="font-size:13px">&#9888; Field strip pending</strong><span style="color:var(--text-dim);font-size:12px">Atlas guidance: clean after every session.</span></div>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        ${fsNeeded.map(n => `<button class="btn small secondary" onclick="quickFieldStrip('${n.firearm.id}')">Log field strip: ${escapeHtml(n.firearm.name)} (${n.count} session${n.count!==1?'s':''} pending)</button>`).join('')}
      </div>
    </div>` : ''}
    ${sessions.length ? sessions.map(s => sessionCard(s)).join('') : `<div class="empty"><div class="icon">&#9650;</div>No sessions yet.<br><br><button class="btn" onclick="openSessionModal()">Log first session</button></div>`}
  `;
}

/* Quick field-strip logger - opens the maintenance modal pre-filled */
function quickFieldStrip(firearmId) {
  openMaintenanceModal(null, firearmId);
  setTimeout(() => {
    const sel = document.getElementById('ma-type');
    if (sel) {
      sel.value = 'field_strip';
      sel.dispatchEvent(new Event('change'));
    }
  }, 0);
}

/* Quick mag-spring log - opens the maintenance modal pre-filled */
function quickMagSpringLog() {
  openMaintenanceModal(null, DB.firearms[0]?.id || '');
  setTimeout(() => {
    const sel = document.getElementById('ma-type');
    if (sel) {
      sel.value = 'mag_springs';
      sel.dispatchEvent(new Event('change'));
    }
    const notes = document.getElementById('ma-notes');
    if (notes && !notes.value) notes.value = 'Replaced springs in all magazines (6-month schedule).';
  }, 0);
}
function sessionCard(s) {
  const f = getFirearm(s.firearmId);
  const ammoLines = (s.ammoUsage || []).map(u => {
    const a = getAmmo(u.ammoId);
    return a ? `${u.rounds} &times; ${escapeHtml(a.brand)} ${escapeHtml(a.grain)}gr ${escapeHtml(a.bulletType)}` : `${u.rounds} rounds (ammo deleted)`;
  });
  const drillsHtml = (s.drills || []).filter(d => d.name).map(d => {
    const def = getDrillDef(d.name);
    const scoring = def?.scoring || 'time';
    const scoreText = formatDrillScore({time:d.time, score:d.score, maxScore:d.maxScore}, scoring);
    return `<span class="chip">${escapeHtml(d.name)}${d.distance ? ' &middot; ' + escapeHtml(d.distance) : ''}${scoreText && scoreText !== '—' ? ' &middot; <strong style="color:var(--accent)">' + scoreText + '</strong>' : ''}</span>`;
  }).join('');
  return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:16px;font-weight:600">${formatDate(s.date)} <span class="badge ${s.type==='competition'?'info':'neutral'}">${escapeHtml(s.type||'practice')}</span></div>
          <div class="text-dim" style="font-size:12px;margin-top:2px">${escapeHtml(f ? f.name : '—')} &middot; ${escapeHtml(s.location || 'Location not set')}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:24px;font-weight:600;color:var(--accent)">${(s.totalRounds||0).toLocaleString()}</div>
          <div class="text-dim" style="font-size:11px">rounds</div>
        </div>
      </div>
      ${ammoLines.length ? `<hr><div style="font-size:13px"><strong style="color:var(--text-dim)">Ammo:</strong> ${ammoLines.join(' &middot; ')}</div>` : ''}
      ${drillsHtml ? `<div style="margin-top:10px"><strong style="color:var(--text-dim);font-size:12px;text-transform:uppercase">Drills</strong><div class="chip-list">${drillsHtml}</div></div>` : ''}
      ${s.distances ? `<div style="margin-top:10px;font-size:13px"><strong style="color:var(--text-dim)">Distances:</strong> ${escapeHtml(s.distances)}</div>` : ''}
      ${(s.malfunctions && s.malfunctions.length) ? `<div style="margin-top:10px"><strong style="color:var(--danger);font-size:12px;text-transform:uppercase">Malfunctions (${s.malfunctions.length})</strong><div class="chip-list">${s.malfunctions.map(m => `<span class="chip" style="border-color:var(--danger);color:var(--danger)">${escapeHtml(m.type)}${m.roundCount ? ' @ ' + m.roundCount : ''}</span>`).join('')}</div></div>` : ''}
      ${s.notes ? `<div style="margin-top:10px;font-size:13px;color:var(--text-dim);white-space:pre-wrap">${escapeHtml(s.notes)}</div>` : ''}
      ${(s.targetImages && s.targetImages.length) ? `<div class="image-gallery">${s.targetImages.map((img) => `<div class="image-thumb" style="background-image:url('${img}')" onclick="showLightbox('${img}')"></div>`).join('')}</div>` : ''}
      <div class="row-actions" style="margin-top:14px">
        <button class="btn small secondary" onclick="openSessionModal('${s.id}')">Edit</button>
        <button class="btn small danger" onclick="deleteSession('${s.id}')">Delete</button>
      </div>
    </div>
  `;
}

        <div class="form-row"><label>Satisfaction</label><div class="skill-rating"><input id="se-sat" type="range" min="1" max="10" value="${s.selfRating.satisfaction}"><span class="val" id="se-sat-val">${s.selfRating.satisfaction}</span></div></div>

      <hr>
      <div class="form-row"><label>Target Images</label>

        <div id="se-img-gallery" class="image-gallery"></div>

      <div class="form-row"><label>Notes</label><textarea id="se-notes" rows="4">${escapeHtml(s.notes)}</textarea></div>

      <button class="btn" onclick="saveSession('${id || ''}')">Save</button>

  `, () => {

function toggleNoHolster(val) {
  window._tempSession.noHolsterOnly = val;
  renderDrillRows();
}
function renderMalfunctionRows() {
  const c = document.getElementById('se-malf-rows');
  if (!c) return;
  const list = window._tempSession.malfunctions || [];
  if (!list.length) {
    c.innerHTML = '<div class="text-dim" style="font-size:12px;padding:6px 0">No malfunctions logged for this session.</div>';
    return;
  }
  c.innerHTML = list.map((m, i) => `
    <div style="background:var(--panel-2);padding:10px;border-radius:6px;margin-bottom:8px">
      <div class="form-grid-3">
        <div class="form-row"><label>Type</label>
          <select onchange="updateMalfunctionRow(${i},'type',this.value)">
            ${['Failure to Feed','Failure to Eject','Failure to Extract','Stovepipe','Double Feed','Failure to Return to Battery','Light Strike','Mag Issue','Slide Lock (early)','Other'].map(t => `<option ${m.type===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        <div class="form-row"><label>Round Count (approx)</label><input type="number" min="0" value="${m.roundCount||''}" onchange="updateMalfunctionRow(${i},'roundCount',parseInt(this.value)||null)"></div>
        <div class="form-row"><label>Resolution</label>
          <select onchange="updateMalfunctionRow(${i},'resolution',this.value)">
            ${['Tap-Rack-Bang','Tap-Rack-Reassess','Mortar (double feed)','Manual clear','Disassembly required','Mag swap','Resolved itself','Other'].map(r => `<option ${m.resolution===r?'selected':''}>${r}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-row"><label>Ammo (optional)</label>
          <select onchange="updateMalfunctionRow(${i},'ammoId',this.value)">
            <option value="">— Unknown —</option>
            ${DB.ammunition.map(a => `<option value="${a.id}" ${m.ammoId===a.id?'selected':''}>${escapeHtml(a.brand)} ${escapeHtml(a.grain)}gr ${escapeHtml(a.bulletType)}</option>`).join('')}
          </select>
        </div>
        <div class="form-row"><label>Magazine (optional)</label><input value="${escapeHtml(m.magazine||'')}" placeholder="e.g. Mag #2, Mec-Gar" onchange="updateMalfunctionRow(${i},'magazine',this.value)"></div>
      </div>
      <div class="form-row" style="margin-bottom:0"><label>Notes</label><input value="${escapeHtml(m.notes||'')}" placeholder="What you saw, conditions" onchange="updateMalfunctionRow(${i},'notes',this.value)"></div>
      <div style="text-align:right;margin-top:4px"><button class="btn small danger" onclick="removeMalfunctionRow(${i})">Remove</button></div>
    </div>
  `).join('');
}
function addMalfunctionRow() {
  if (!window._tempSession.malfunctions) window._tempSession.malfunctions = [];
  window._tempSession.malfunctions.push({ type:'Failure to Feed', roundCount:null, resolution:'Tap-Rack-Bang', ammoId:'', magazine:'', notes:'' });
  renderMalfunctionRows();
}
function removeMalfunctionRow(i) { window._tempSession.malfunctions.splice(i, 1); renderMalfunctionRows(); }
function updateMalfunctionRow(i, key, val) { window._tempSession.malfunctions[i][key] = val; }
function renderAmmoRows() {
  const c = document.getElementById('se-ammo-rows');
  c.innerHTML = window._tempSession.ammoUsage.map((u, i) => `
    <div class="form-grid-3" style="align-items:end">
      <div class="form-row"><label>Ammunition</label>
        <select onchange="updateAmmoRow(${i},'ammoId',this.value)">
          <option value="">— Select ammo —</option>
          ${DB.ammunition.map(a => `<option value="${a.id}" ${u.ammoId===a.id?'selected':''}>${escapeHtml(a.brand)} ${escapeHtml(a.grain)}gr ${escapeHtml(a.bulletType)} (${(a.quantity||0).toLocaleString()} avail)</option>`).join('')}
        </select>
      </div>
      <div class="form-row"><label>Rounds</label>
        <input type="number" min="0" value="${u.rounds||0}" onchange="updateAmmoRow(${i},'rounds',parseInt(this.value)||0)">
      </div>
      <div class="form-row"><button class="btn small danger" onclick="removeAmmoRow(${i})">Remove</button></div>
    </div>
  `).join('');
  recalcTotal();
}
function addAmmoRow() { window._tempSession.ammoUsage.push({ ammoId:'', rounds:0 }); renderAmmoRows(); }
function removeAmmoRow(i) { window._tempSession.ammoUsage.splice(i, 1); renderAmmoRows(); }
function updateAmmoRow(i, key, val) { window._tempSession.ammoUsage[i][key] = val; recalcTotal(); }
function recalcTotal() {
  const total = window._tempSession.ammoUsage.reduce((s, u) => s + (u.rounds || 0), 0);
  document.getElementById('se-total').value = total;
}

function renderDrillRows() {
  const c = document.getElementById('se-drill-rows');
  // Determine session type to filter drills
  const sessTypeEl = document.getElementById('se-type');
  const sessType = sessTypeEl ? sessTypeEl.value : 'practice';
  const isDry = sessType === 'dry_fire';
  const noHolsterFilter = window._tempSession.noHolsterOnly === true;

  // Filter drill library based on session type and holster preference
  const filteredDrills = DB.drillLibrary.filter(dr => {
    if (isDry && !dr.dryCompatible) return false;
    if (!isDry && !dr.liveCompatible) return false;
    if (noHolsterFilter && dr.requiresHolster) return false;
    return true;
  });

  c.innerHTML = window._tempSession.drills.map((d, i) => {
    const def = getDrillDef(d.name);
    const scoring = def?.scoring || 'time';
    const showTime = scoring === 'time' || scoring === 'time_score';
    const showScore = scoring === 'score' || scoring === 'time_score';
    const isCustom = d.name && !DB.drillLibrary.find(dr => dr.name === d.name);
    // Show currently-selected drill even if filter excludes it (so editing works)
    const optList = filteredDrills.slice();
    if (d.name && !optList.find(x => x.name === d.name)) {
      const existing = DB.drillLibrary.find(x => x.name === d.name);
      if (existing) optList.push(existing);
    }
    return `
    <div style="background:var(--panel-2);padding:10px;border-radius:6px;margin-bottom:8px">
      <div class="form-grid-2">
        <div class="form-row"><label>Drill ${def && def.requiresHolster ? '<span class="badge neutral" style="margin-left:6px">holster</span>' : ''}${def && !def.liveCompatible ? '<span class="badge info" style="margin-left:6px">dry</span>' : ''}</label>
          <select onchange="updateDrillRow(${i},'name',this.value)">
            <option value="">— Select drill —</option>
            ${optList.map(dr => `<option value="${escapeHtml(dr.name)}" ${d.name===dr.name?'selected':''}>${escapeHtml(dr.name)}${dr.requiresHolster?' (holster)':''}${!dr.liveCompatible?' (dry only)':''}</option>`).join('')}
            <option value="__custom" ${isCustom?'selected':''}>Custom...</option>
          </select>
          ${isCustom ? `<input style="margin-top:4px" placeholder="Custom drill name" value="${escapeHtml(d.name)}" onchange="updateDrillRow(${i},'name',this.value)">` : ''}
        </div>
        <div class="form-row"><label>Distance</label>
          <input value="${escapeHtml(d.distance||'')}" placeholder="e.g. 7yd" onchange="updateDrillRow(${i},'distance',this.value)">
        </div>
      </div>
      ${d.name ? `
        <div class="form-grid-3">
          ${showTime ? `<div class="form-row"><label>Time (sec)</label><input type="number" step="0.01" min="0" value="${d.time != null ? d.time : ''}" onchange="updateDrillRow(${i},'time',parseFloat(this.value)||null)"></div>` : '<div></div>'}
          ${showScore ? `<div class="form-row"><label>Score</label><input type="number" min="0" value="${d.score != null ? d.score : ''}" onchange="updateDrillRow(${i},'score',parseFloat(this.value)||null)"></div>` : '<div></div>'}
          ${showScore ? `<div class="form-row"><label>Max Score</label><input type="number" min="0" value="${d.maxScore || (def?.maxScore || '')}" onchange="updateDrillRow(${i},'maxScore',parseFloat(this.value)||null)"></div>` : '<div></div>'}
        </div>
        <div class="form-row" style="margin-bottom:0"><label>Drill Notes</label><input value="${escapeHtml(d.notes||'')}" placeholder="What worked / didn't work" onchange="updateDrillRow(${i},'notes',this.value)"></div>
      ` : ''}
      <div style="text-align:right;margin-top:4px"><button class="btn small danger" onclick="removeDrillRow(${i})">Remove drill</button></div>
    </div>
    `;
  }).join('');
}

function handleImageUpload(evt) {
  const files = evt.target.files;
  if (!files || !files.length) return;
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxW = 1000;
        const ratio = Math.min(1, maxW / img.width);
        canvas.width = img.width * ratio;
        canvas.height = img.height * ratio;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        if (!window._tempSession.targetImages) window._tempSession.targetImages = [];
        window._tempSession.targetImages.push(dataUrl);
        renderSessionImages();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
  evt.target.value = '';
}
function showLightbox(src) {
  document.getElementById('lightbox-img').src = src;

function saveSession(id) {
  const t = window._tempSession;
  t.date = document.getElementById('se-date').value;
  t.type = document.getElementById('se-type').value;
  t.firearmId = document.getElementById('se-firearm').value;
  t.location = document.getElementById('se-location').value.trim();
  t.distances = document.getElementById('se-dist').value.trim();
  t.notes = document.getElementById('se-notes').value.trim();
  t.selfRating = {
    focus: parseInt(document.getElementById('se-focus').value),
    fundamentals: parseInt(document.getElementById('se-fund').value),
    satisfaction: parseInt(document.getElementById('se-sat').value)
  };
  t.ammoUsage = t.ammoUsage.filter(u => u.ammoId && u.rounds > 0);
  t.drills = t.drills.filter(d => d.name);
  t.malfunctions = (t.malfunctions || []).filter(m => m.type);
  t.totalRounds = t.ammoUsage.reduce((s, u) => s + u.rounds, 0);

  if (!t.date) { alert('Date required'); return; }
  if (!t.firearmId) { alert('Firearm required'); return; }

  let prevAmmo = [];
  if (id) {
    const existing = DB.sessions.find(x => x.id === id);
    prevAmmo = existing ? existing.ammoUsage || [] : [];
  }
  for (const u of prevAmmo) {
    const a = getAmmo(u.ammoId);
    if (a) a.quantity = (a.quantity || 0) + u.rounds;
  }
  for (const u of t.ammoUsage) {
    const a = getAmmo(u.ammoId);
    if (a) a.quantity = Math.max(0, (a.quantity || 0) - u.rounds);
  }

  if (id) {
    const idx = DB.sessions.findIndex(x => x.id === id);
    DB.sessions[idx] = { ...DB.sessions[idx], ...t };
  } else {
    DB.sessions.push({ id: uid('se'), ...t });
  }
  saveDB(); closeModal(); renderSessions();
  // Offer field strip log if this session is the latest and a field strip is now pending
  if (!id) {
    const latestForFirearm = [...DB.sessions].filter(x => x.firearmId === t.firearmId).sort((a,b)=>b.date.localeCompare(a.date))[0];
    const isLatest = latestForFirearm && latestForFirearm.id !== id && latestForFirearm.date === t.date;
    const lastFS = lastMaintenance(t.firearmId, 'field_strip');
    const needsFS = !lastFS || lastFS.date < t.date;
    if (isLatest && needsFS) {
      const f = getFirearm(t.firearmId);
      setTimeout(() => {
        if (confirm(`Session saved. Log a field strip & clean for ${f ? f.name : 'this firearm'} now?\n\n(Atlas guidance: clean after every range session.)`)) {
          quickFieldStrip(t.firearmId);
        }
      }, 100);
    }
  }
}
function deleteSession(id) {
  if (!confirm('Delete this session? Ammo will be returned to inventory.')) return;
  const s = DB.sessions.find(x => x.id === id);
  if (s) {
    for (const u of (s.ammoUsage || [])) {
      const a = getAmmo(u.ammoId);
      if (a) a.quantity = (a.quantity || 0) + u.rounds;
    }
  }
  DB.sessions = DB.sessions.filter(x => x.id !== id);
  saveDB(); renderSessions();
}

  const list = [];
  for (const s of DB.sessions) {
    for (const m of (s.malfunctions || [])) {
      list.push({ ...m, sessionId: s.id, date: s.date, firearmId: s.firearmId, source: 'session' });

  }
  for (const m of (DB.malfunctions || [])) {
    list.push({ ...m, source: 'standalone' });

  return list.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
}

function maintenanceRecommendations(type) {
  const r = {
    field_strip: `<ul>
      <li>Clear the firearm. Verify empty chamber and magazine well.</li>
      <li>Field strip per Atlas/2011 procedure: remove slide stop, slide assembly, recoil spring, barrel.</li>
      <li>Brush bore from chamber to muzzle. Push patches through until clean.</li>
      <li>Wipe slide rails, frame rails, and barrel hood. Use a nylon brush on the breech face.</li>
      <li><strong>Atlas guidance:</strong> Use oil, not grease. Atlas advises against greasing 1911s/2011s.</li>
      <li>Apply oil sparingly to slide rails, barrel hood/lugs, disconnector, and frame rails.</li>
      <li>Wipe down the magazine well. Inspect extractor function.</li>
      <li>Reassemble and function-check.</li>
    </ul>`,
    deep_clean: `<ul>
      <li>Complete field strip first.</li>
      <li>Remove firing pin and firing pin spring; clean firing pin channel thoroughly.</li>
      <li>Remove extractor; clean extractor and channel; verify tension.</li>
      <li>Clean the breech face deeply with a nylon brush and solvent.</li>
      <li>Inspect recoil spring for wear and replace if needed.</li>
      <li>Inspect firing pin stop, ejector, and slide stop for wear.</li>
      <li>Detail-clean comp/compensator if equipped.</li>
      <li>Check trigger group for fouling. Light solvent, minimal re-oil.</li>
      <li>Inspect grip/grip screws, bushings, and any tuning components.</li>
      <li>Re-oil per Atlas guidance and function-check.</li>
    </ul>`,
    annual_inspection: `<ul>
      <li>Full deep clean as above.</li>
      <li>Inspect frame and slide for cracks (especially around rails and slide stop pin hole).</li>
      <li>Check timing and lockup.</li>
      <li>Verify safety, slide stop, and grip safety function.</li>
      <li>Measure trigger pull and reset.</li>
      <li>Consider sending pistol to <strong>Atlas Gunworks Pistol Service</strong> for factory-level inspection.</li>
      <li>Replace recoil spring and firing pin spring if not recently done.</li>
      <li>Inspect magazines: tubes, springs, followers, feed lips.</li>
    </ul>`,
    comp_clean: `<ul>
      <li>Atlas has a dedicated procedure for compensator cleaning.</li>
      <li>Use solvent and bronze brush to remove carbon from comp ports.</li>
      <li>Avoid abrasive tools that can damage finish or thread fit.</li>
      <li>Confirm comp is properly torqued after reassembly.</li>
    </ul>`,
    repair: `<ul>
      <li>Document the issue, parts replaced, and source.</li>
      <li>Function-check thoroughly before next live-fire session.</li>
      <li>Consider Atlas Gunworks Pistol Service for factory-supported repairs.</li>
    </ul>`,
    recoil_spring: `<ul>
      <li>Replacement interval is per-firearm and depends on use; 5,000-7,500 rounds is typical for competition 2011s.</li>
      <li>Look for symptoms suggesting an old spring: sluggish slide return, brass landing close/short, light-strike issues, or unusually heavy felt recoil.</li>
      <li>Use the Atlas-recommended spring weight for your specific load (refer to your owner's manual or Atlas service).</li>
      <li>Inspect the recoil spring guide rod and plug while the spring is out.</li>
      <li>After install, run a function check and live-fire a small batch to confirm cycling.</li>
      <li>This app marks the firearm's "rounds since recoil spring" counter back to zero on save.</li>
    </ul>`,
    mag_springs: `<ul>
      <li>Atlas-style 2011 magazines benefit from spring replacement every 6 months under regular use.</li>
      <li>Disassemble each magazine: baseplate, follower, spring out.</li>
      <li>Inspect old springs for kinks, set, or unequal coils. Discard if any sign of wear.</li>
      <li>Install fresh springs; ensure the follower glides freely.</li>
      <li>Cycle each magazine fully loaded and verify proper feed lip tension.</li>
      <li>This app's 6-month timer resets on save; next reminder will fire 6 months out.</li>
    </ul>`,
    mag_maintenance: `<ul>
      <li>Atlas recommends regular magazine cleaning to prevent feeding issues.</li>
      <li>Disassemble: remove baseplate, follower, and spring.</li>
      <li>Wipe inside the tube clean. Magazines should run dry or with very light film.</li>
      <li>Inspect feed lips for damage or peening.</li>
      <li>Inspect spring for kinks. Replace at first sign of weakness (or run on the 6-month schedule).</li>
      <li>Reassemble and load to capacity to test for tension.</li>
    </ul>`,
    other: `<div class="text-dim">Add notes describing what was done.</div>`
  };
  return r[type] || '';
}
function saveMaintenance(id) {
  const data = {
    date: document.getElementById('ma-date').value,
    firearmId: document.getElementById('ma-firearm').value,
    type: document.getElementById('ma-type').value,
    performedBy: document.getElementById('ma-by').value.trim(),
    partsReplaced: document.getElementById('ma-parts').value.trim(),
    notes: document.getElementById('ma-notes').value.trim()
  };
  if (!data.date) { alert('Date required'); return; }
  if (id) {
    const idx = DB.maintenance.findIndex(x => x.id === id);
    DB.maintenance[idx] = { ...DB.maintenance[idx], ...data };
  } else {
    DB.maintenance.push({ id: uid('ma'), ...data });
  }
  saveDB(); closeModal(); renderMaintenance();
}
function deleteMaintenance(id) {
  if (!confirm('Delete this maintenance record?')) return;
  DB.maintenance = DB.maintenance.filter(x => x.id !== id);
  saveDB(); renderMaintenance();
}

  const a = document.createElement('a');
  a.href = url; a.download = `pistol-tracker-backup-${todayISO()}.json`;
  a.click(); URL.revokeObjectURL(url);
}
function exportCSV(kind) {
  let rows = [], headers = [];
  if (kind === 'sessions') {
    headers = ['Date','Type','Firearm','Location','Distances','Total Rounds','Drills','Notes'];
    rows = DB.sessions.map(s => [
      s.date, s.type, (getFirearm(s.firearmId)||{}).name || '',
      s.location||'', s.distances||'', s.totalRounds||0,
      (s.drills||[]).map(d=>d.name).join('; '),
      (s.notes||'').replace(/\n/g,' ')
    ]);
  } else if (kind === 'maintenance') {
    headers = ['Date','Firearm','Type','Performed By','Parts Replaced','Notes'];
    rows = DB.maintenance.map(m => [
      m.date, (getFirearm(m.firearmId)||{}).name || '',
      m.type, m.performedBy||'', m.partsReplaced||'',
      (m.notes||'').replace(/\n/g,' ')
    ]);
  }
  const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `pistol-tracker-${kind}-${todayISO()}.csv`;
  a.click(); URL.revokeObjectURL(url);
}
function importJSON(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!confirm('This will overwrite all current data. Continue?')) return;
      DB = parsed;
      saveDB();
      renderSettings();
      alert('Import complete.');
    } catch (err) {
      alert('Invalid backup file.');
    }
  };
  reader.readAsText(file);
}
function resetAll() {
  if (!confirm('Reset ALL data? This cannot be undone.')) return;
  if (!confirm('Last chance. Really reset everything?')) return;
  localStorage.removeItem(STORAGE_KEY);
  DB = JSON.parse(JSON.stringify(SEED));
  saveDB();
  renderSettings();
}
document.getElementById('export-data').addEventListener('click', e => { e.preventDefault(); exportJSON(); });

/* ============================================================
   CHARTS (inline SVG)
   ============================================================ */
function roundsChart() {
  const now = new Date();
  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({
      key: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,
      label: d.toLocaleString(undefined,{month:'short'}),
      rounds: 0
    });
  }
  for (const s of DB.sessions) {
    const k = s.date.slice(0, 7);
    const m = months.find(x => x.key === k);
    if (m) m.rounds += s.totalRounds || 0;
  }
  const maxR = Math.max(...months.map(m=>m.rounds), 100);
  const W = 600, H = 200, padL = 36, padB = 24, padT = 10, padR = 8;
  const barW = (W - padL - padR) / months.length - 4;
  let bars = '';
  months.forEach((m, i) => {
    const h = ((m.rounds / maxR) * (H - padT - padB));
    const x = padL + i * (barW + 4);
    const y = H - padB - h;
    bars += `<rect x="${x}" y="${y}" width="${barW}" height="${h}" fill="var(--accent)" rx="2"></rect>`;
    bars += `<text x="${x + barW/2}" y="${H - 8}" text-anchor="middle" fill="var(--text-dim)" font-size="10">${m.label}</text>`;
    if (m.rounds > 0) bars += `<text x="${x + barW/2}" y="${y - 4}" text-anchor="middle" fill="var(--text)" font-size="10">${m.rounds}</text>`;
  });
  let grid = '';
  for (let i = 0; i <= 4; i++) {
    const y = padT + i * ((H - padT - padB) / 4);
    const val = Math.round(maxR - i * (maxR/4));
    grid += `<line x1="${padL}" x2="${W-padR}" y1="${y}" y2="${y}" stroke="var(--border)" stroke-dasharray="2,3"></line>`;
    grid += `<text x="${padL-6}" y="${y+3}" text-anchor="end" fill="var(--text-dim)" font-size="10">${val}</text>`;
  }
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${grid}${bars}</svg>`;
}

function cumulativeRoundsChart() {
  const sessions = [...DB.sessions].sort((a,b)=>a.date.localeCompare(b.date));
  if (!sessions.length) return `<div class="empty">No session data yet.</div>`;
  const W = 600, H = 220, padL = 50, padB = 30, padT = 10, padR = 10;
  let cum = 0;
  const points = sessions.map(s => { cum += s.totalRounds || 0; return { date: s.date, cum }; });
  const maxC = Math.max(...points.map(p=>p.cum), 100);
  const minD = new Date(points[0].date).getTime();
  const maxD = new Date(points[points.length-1].date).getTime() || minD + 1;
  const xFor = d => padL + ((new Date(d).getTime() - minD) / Math.max(1, maxD - minD)) * (W - padL - padR);
  const yFor = c => H - padB - (c / maxC) * (H - padT - padB);
  let path = points.map((p, i) => `${i?'L':'M'} ${xFor(p.date).toFixed(1)} ${yFor(p.cum).toFixed(1)}`).join(' ');
  let dots = points.map(p => `<circle cx="${xFor(p.date)}" cy="${yFor(p.cum)}" r="3" fill="var(--accent)"></circle>`).join('');
  let grid = '';
  for (let i = 0; i <= 4; i++) {
    const y = padT + i * ((H - padT - padB) / 4);
    const val = Math.round(maxC - i * (maxC/4));
    grid += `<line x1="${padL}" x2="${W-padR}" y1="${y}" y2="${y}" stroke="var(--border)" stroke-dasharray="2,3"></line>`;
    grid += `<text x="${padL-6}" y="${y+3}" text-anchor="end" fill="var(--text-dim)" font-size="10">${val.toLocaleString()}</text>`;
  }
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${grid}<path d="${path}" stroke="var(--accent)" stroke-width="2" fill="none"/>${dots}</svg>`;
}

function sessionRatingsChart(sessions) {
  if (!sessions.length) return `<div class="empty">Log a few sessions with self-ratings to see the trend.</div>`;
  const W = 600, H = 220, padL = 36, padB = 30, padT = 10, padR = 10;
  const minD = new Date(sessions[0].date).getTime();
  const maxD = new Date(sessions[sessions.length-1].date).getTime() || minD + 1;
  const xFor = d => padL + ((new Date(d).getTime() - minD) / Math.max(1, maxD - minD)) * (W - padL - padR);
  const yFor = v => H - padB - (v / 10) * (H - padT - padB);
  const colors = { focus: 'var(--info)', fundamentals: 'var(--accent)', satisfaction: 'var(--success)' };
  let lines = '';
  for (const key of ['focus','fundamentals','satisfaction']) {
    const path = sessions.map((s, i) => `${i?'L':'M'} ${xFor(s.date).toFixed(1)} ${yFor(s.selfRating[key]).toFixed(1)}`).join(' ');
    lines += `<path d="${path}" stroke="${colors[key]}" stroke-width="2" fill="none"></path>`;
  }
  let grid = '';
  for (let i = 0; i <= 5; i++) {
    const y = padT + i * ((H - padT - padB) / 5);
    grid += `<line x1="${padL}" x2="${W-padR}" y1="${y}" y2="${y}" stroke="var(--border)" stroke-dasharray="2,3"></line>`;
    grid += `<text x="${padL-6}" y="${y+3}" text-anchor="end" fill="var(--text-dim)" font-size="10">${10 - i*2}</text>`;
  }
  let legend = '';
  ['focus','fundamentals','satisfaction'].forEach((k, i) => {
    legend += `<g transform="translate(${padL + i*120}, ${padT-2})"><rect width="10" height="10" fill="${colors[k]}"/><text x="14" y="9" fill="var(--text)" font-size="11">${k}</text></g>`;
  });
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${grid}${lines}${legend}</svg>`;
}

function skillTrendChart() {
  const assess = [...DB.skillAssessments].sort((a,b)=>a.date.localeCompare(b.date));
  if (assess.length < 2) return `<div class="empty">Need at least 2 assessments to chart progression.</div>`;
  const W = 700, H = 240, padL = 36, padB = 30, padT = 10, padR = 130;
  const minD = new Date(assess[0].date).getTime();
  const maxD = new Date(assess[assess.length-1].date).getTime() || minD + 1;
  const xFor = d => padL + ((new Date(d).getTime() - minD) / Math.max(1, maxD - minD)) * (W - padL - padR);
  const yFor = v => H - padB - (v / 10) * (H - padT - padB);
  const palette = ['var(--accent)','var(--info)','var(--success)','var(--warn)','var(--danger)','#bb86fc','#03dac6','#ffb74d'];
  let lines = '';
  let legend = '';
  SKILL_AREAS.forEach((sa, i) => {
    const color = palette[i % palette.length];
    const path = assess.map((a, j) => `${j?'L':'M'} ${xFor(a.date).toFixed(1)} ${yFor(a.ratings[sa.key]||0).toFixed(1)}`).join(' ');
    lines += `<path d="${path}" stroke="${color}" stroke-width="2" fill="none"></path>`;
    legend += `<g transform="translate(${W - padR + 5}, ${padT + i*22})"><rect width="10" height="10" fill="${color}"/><text x="14" y="9" fill="var(--text)" font-size="11">${sa.label}</text></g>`;
  });
  let grid = '';
  for (let i = 0; i <= 5; i++) {
    const y = padT + i * ((H - padT - padB) / 5);
    grid += `<line x1="${padL}" x2="${W-padR}" y1="${y}" y2="${y}" stroke="var(--border)" stroke-dasharray="2,3"></line>`;
    grid += `<text x="${padL-6}" y="${y+3}" text-anchor="end" fill="var(--text-dim)" font-size="10">${10 - i*2}</text>`;
  }
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${grid}${lines}${legend}</svg>`;
}

function drillProgressionChart() {
  const recs = allDrillRecords();
  const counts = {};
  for (const r of recs) counts[r.name] = (counts[r.name]||0) + 1;
  const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  if (!top) return `<div class="empty">No drill data yet.</div>`;
  const drillName = top[0];
  const def = getDrillDef(drillName);
  const scoring = def?.scoring || 'time';
  const list = recs
    .filter(r => r.name === drillName && (scoring === 'time' ? r.time != null : r.score != null))
    .sort((a,b)=>a.date.localeCompare(b.date));
  if (list.length < 2) return `<div class="empty">Most-attempted drill: ${escapeHtml(drillName)}. Need 2+ scored attempts to chart.</div>`;
  const W = 600, H = 220, padL = 50, padB = 30, padT = 24, padR = 10;
  const vals = list.map(r => scoring === 'time' ? r.time : r.score);
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const minD = new Date(list[0].date).getTime();
  const maxD = new Date(list[list.length-1].date).getTime() || minD + 1;
  const xFor = d => padL + ((new Date(d).getTime() - minD) / Math.max(1, maxD - minD)) * (W - padL - padR);
  const yFor = v => H - padB - ((v - minV) / Math.max(0.001, maxV - minV)) * (H - padT - padB);
  // For "time", lower is better -> invert
  const yForFinal = scoring === 'time' ? (v => padT + ((v - minV) / Math.max(0.001, maxV - minV)) * (H - padT - padB)) : yFor;
  const path = list.map((r, i) => {
    const v = scoring === 'time' ? r.time : r.score;
    return `${i?'L':'M'} ${xFor(r.date).toFixed(1)} ${yForFinal(v).toFixed(1)}`;
  }).join(' ');
  const dots = list.map(r => {
    const v = scoring === 'time' ? r.time : r.score;
    return `<circle cx="${xFor(r.date)}" cy="${yForFinal(v)}" r="3" fill="var(--accent)"></circle>`;
  }).join('');
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <text x="${padL}" y="14" fill="var(--text)" font-size="12" font-weight="600">${escapeHtml(drillName)} (${scoring}, ${scoring==='time'?'lower is better':'higher is better'})</text>
    <path d="${path}" stroke="var(--accent)" stroke-width="2" fill="none"/>${dots}
  </svg>`;
}

function sessionTypeBreakdown() {
  const counts = {};
  for (const s of DB.sessions) counts[s.type||'practice'] = (counts[s.type||'practice']||0) + 1;
  const total = Object.values(counts).reduce((a,b)=>a+b,0);
  if (!total) return '<div class="empty">No sessions yet.</div>';
  return `<div>${Object.entries(counts).map(([t, c]) => `
    <div style="margin:8px 0">
      <div style="display:flex;justify-content:space-between;font-size:13px"><strong>${escapeHtml(t)}</strong><span class="text-dim">${c} (${Math.round(c/total*100)}%)</span></div>
      <div class="progress"><div class="progress-fill" style="width:${(c/total)*100}%"></div></div>
    </div>
  `).join('')}</div>`;
}
